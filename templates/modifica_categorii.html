{% extends "layout.html" %}

{% block content %}
<style>:root { --accent: #bf5af2; }</style>
<div class="form-card">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1>Editează Categorie</h1>
        <a href="/categorii" style="color: #86868b; text-decoration: none;">&larr; Înapoi</a>
    </div>

    <form method="POST">
        <label>ID Categorie</label>
        <input type="text" value="{{ cat.id_categorie }}" readonly>

        <label>Nume Categorie</label>
        <input type="text" name="nume_categorie" value="{{ cat.nume_categorie }}" required>

        <input type="submit" value="Salvează Modificarea" class="btn-submit">
    </form>
</div>
{% endblock %}
